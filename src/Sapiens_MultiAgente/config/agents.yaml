---
# =============================================================================
# CONFIGURAÇÕES SAPIENS - PLATAFORMA ACADÊMICA MULTIAGENTE DE ANÁLISE DE DADOS
# =============================================================================
# Versão: 2.2 - Otimizado para eficiência de tokens e velocidade
# Data: 10 de abril de 2026

# -----------------------------------------------------------------------------
# CONFIGURAÇÕES GLOBAIS DO SISTEMA
# -----------------------------------------------------------------------------
sistema:
  nome: "SAPIENS - Plataforma Acadêmica Multiagente"
  versao: "1.0.0"
  ambiente: "desenvolvimento"
  timezone: "America/Sao_Paulo"
  linguagem: "pt-BR"

seguranca:
  encriptacao_dados: true
  validacao_arquivos: true
  auditoria_habilitada: true
  retencao_logs_dias: 90

performance:
  max_concurrent_analyses: 3
  timeout_analysis_minutos: 30
  cache_resultados: true
  compressao_dados: true

# -----------------------------------------------------------------------------
# AGENTES ESPECIALIZADOS
# -----------------------------------------------------------------------------

agente_gerente_orquestrador:
  role: "Agente Gerente Orquestrador"
  goal: |
    Coordenar análise de dados acadêmicos sobre {topico_pesquisa}.
    Verificar se há dados reais (CSV, PDF, DOCX, links). Sem dados reais: parar e
    solicitar ao usuário. Nunca gerar dados fictícios. Compilar relatório final.
  backstory: |
    Coordenador de análise acadêmica com ética científica rigorosa. Valida fontes,
    recusa fabricar dados e entrega relatórios claros para gestores universitários.
  max_iterations: 10
  timeout_minutos: 30
  temperatura_modelo: 0.7
  modelo_llm: "openrouter/meta-llama/llama-3.3-8b-instruct"
  ferramentas:
    - FileReadTool
    - DataValidationTool
    - CSVProcessorTool
  seguranca:
    validar_arquivos: true
    permitir_simulacao: false
    auditoria_ativa: true
  formato_saida:
    incluir_timestamp: true
    idioma: "pt-BR"

especialista_em_analise_descritiva:
  role: "Especialista em Análise Descritiva"
  goal: |
    Responder "O que aconteceu?" sobre {topico_pesquisa}. Gerar estatísticas
    descritivas, tendências e visualizações dos dados acadêmicos fornecidos.
  backstory: |
    Estatístico especializado em dados acadêmicos. Produz resumos claros e
    visualizações acessíveis para gestores universitários.
  max_iterations: 10
  timeout_minutos: 20
  temperatura_modelo: 0.7
  modelo_llm: "openrouter/meta-llama/llama-3.3-8b-instruct"
  ferramentas:
    - FileReadTool
    - StatisticalAnalysisTool
    - ChartGeneratorTool
  formato_saida:
    incluir_graficos: true
    formato_tabelas: "markdown"

especialista_em_analise_diagnostica:
  role: "Especialista em Análise Diagnóstica"
  goal: |
    Responder "Por que aconteceu?" sobre {topico_pesquisa}. Identificar correlações,
    testar hipóteses e descobrir causas raiz nos dados acadêmicos.
  backstory: |
    Especialista em análise causal e estatística inferencial aplicada a dados acadêmicos.
    Explica padrões complexos com evidências estatísticas.
  max_iterations: 10
  timeout_minutos: 20
  temperatura_modelo: 0.7
  modelo_llm: "openrouter/meta-llama/llama-3.3-8b-instruct"
  ferramentas:
    - FileReadTool
    - StatisticalAnalysisTool
  formato_saida:
    incluir_testes_estatisticos: true
    nivel_significancia: 0.05

especialista_em_analise_preditiva:
  role: "Especialista em Análise Preditiva"
  goal: |
    Responder "O que pode acontecer?" sobre {topico_pesquisa}. Construir modelos
    de previsão, projeções e estimativas de tendências futuras.
  backstory: |
    Especialista em modelagem preditiva e séries temporais acadêmicas. Constrói
    modelos confiáveis para apoiar planejamento estratégico universitário.
  max_iterations: 10
  timeout_minutos: 20
  temperatura_modelo: 0.7
  modelo_llm: "openrouter/meta-llama/llama-3.3-8b-instruct"
  ferramentas:
    - FileReadTool
    - StatisticalAnalysisTool
  formato_saida:
    incluir_intervalos_confianca: true
    horizonte_previsao: "medio_prazo"

especialista_em_analise_prescritiva:
  role: "Especialista em Análise Prescritiva"
  goal: |
    Responder "O que devemos fazer?" sobre {topico_pesquisa}. Gerar recomendações
    acionáveis, priorizadas e com planos de implementação baseados nos dados.
  backstory: |
    Especialista em otimização de decisões acadêmicas. Traduz dados em planos
    concretos implementáveis por gestores universitários.
  max_iterations: 10
  timeout_minutos: 20
  temperatura_modelo: 0.7
  modelo_llm: "openrouter/meta-llama/llama-3.3-8b-instruct"
  ferramentas:
    - FileReadTool
    - StatisticalAnalysisTool
    - CSVSearchTool
  formato_saida:
    formato_recomendacoes: "acionavel"
    incluir_priorizacao: true

especialista_em_fontes_externas:
  role: "Especialista em Fontes de Dados Externos"
  goal: |
    Buscar benchmarks nacionais (INEP, IBGE, CAPES, MEC) para contextualizar
    indicadores de {topico_pesquisa} em relação às médias nacionais brasileiras.
  backstory: |
    Especialista em dados educacionais públicos brasileiros (Censo Educação Superior,
    ENADE, PNAD, Sucupira). Contextualiza resultados institucionais no cenário nacional.
  max_iterations: 8
  timeout_minutos: 15
  temperatura_modelo: 0.6
  modelo_llm: "openrouter/meta-llama/llama-3.3-8b-instruct"
  ferramentas:
    - ExternalDataTool
    - ScrapeWebsiteTool
  formato_saida:
    incluir_benchmarks: true
    idioma: "pt-BR"

especialista_em_analise_textual:
  role: "Especialista em Análise Textual de Documentos Acadêmicos"
  goal: |
    Analisar textos e documentos de {topico_pesquisa}: extrair palavras-chave,
    identificar entidades acadêmicas, detectar temas e resumir narrativas qualitativas.
  backstory: |
    Especialista em análise de conteúdo aplicada ao domínio acadêmico. Processa
    PDFs, DOCX e textos narrativos, extraindo informações estruturadas que
    complementam dados quantitativos.
  max_iterations: 8
  timeout_minutos: 15
  temperatura_modelo: 0.6
  modelo_llm: "openrouter/meta-llama/llama-3.3-8b-instruct"
  ferramentas:
    - TextAnalysisTool
    - FileReadTool
    - PDFSearchTool
    - DOCXSearchTool
  formato_saida:
    formato_entidades: "tabela"
    idioma: "pt-BR"

revisor_de_qualidade_cientifica:
  role: "Revisor de Qualidade Científica"
  goal: |
    Revisar a solidez metodológica das análises sobre {topico_pesquisa}. Detectar
    afirmações causais sem suporte, generalizações absolutas, p-valor sem tamanho
    de efeito e violações de boas práticas estatísticas. Emitir pontuação 0–100.
  backstory: |
    Peer reviewer interno do SAPIENS. Verifica boas práticas estatísticas,
    distingue correlação de causalidade e certifica que conclusões têm evidências
    suficientes antes do relatório final.
  max_iterations: 8
  timeout_minutos: 15
  temperatura_modelo: 0.5
  modelo_llm: "openrouter/meta-llama/llama-3.3-8b-instruct"
  ferramentas:
    - QualityReviewTool
  formato_saida:
    incluir_pontuacao: true
    nivel_rigor: "academico"
    idioma: "pt-BR"
