# =============================================================================
# CONFIGURACAO DE LLM — SAPIENS
# =============================================================================
# "ativo" define o modelo padrao (fallback para agentes sem config especifica).
# "agentes" permite atribuir modelos individuais por agente.
# Via API: POST /api/config/llm  {"modelo": "<chave>"}
#          POST /api/config/llm  {"agente": "<nome>", "modelo": "<chave>"}
#
# groq_fallback: modelo Groq ativado automaticamente se OpenRouter falhar.
# Configure GROQ_API_KEY no .env para habilitar o fallback.

ativo: gemma_4_moe

# ------------------------------------------------------------------
# MODELO POR AGENTE (otimizado por tipo de tarefa)
# ------------------------------------------------------------------
agentes:
  agente_gerente_orquestrador: llama_33_70b
  especialista_em_analise_descritiva: gemma_31b
  especialista_em_analise_diagnostica: nemotron_120b
  especialista_em_analise_preditiva: nemotron_120b
  especialista_em_analise_prescritiva: llama_33_70b
  especialista_em_fontes_externas: gemma_4_moe
  especialista_em_analise_textual: gemma_31b
  revisor_de_qualidade_cientifica: nemotron_120b

# ------------------------------------------------------------------
# CATALOGO DE MODELOS
# ------------------------------------------------------------------
modelos:
  nemotron_120b:
    nome: NVIDIA Nemotron 3 Super 120B (gratuito)
    model_id: openrouter/nvidia/nemotron-3-super-120b-a12b:free
    temperatura: 0.6
    groq_fallback: groq/openai/gpt-oss-120b
    descricao: "120B MoE (12B ativos), 262K contexto — reasoning, diagnostica, preditiva e revisao cientifica"

  llama_33_70b:
    nome: Llama 3.3 70B (gratuito)
    model_id: openrouter/meta-llama/llama-3.3-70b-instruct:free
    temperatura: 0.7
    groq_fallback: groq/llama-3.3-70b-versatile
    descricao: "86% MMLU, melhor instruction following — orquestracao, prescricao e relatorio final"

  gemma_31b:
    nome: Gemma 4 31B (gratuito)
    model_id: openrouter/google/gemma-4-31b-it:free
    temperatura: 0.7
    groq_fallback: groq/meta-llama/llama-4-scout-17b-16e-instruct
    descricao: "140+ idiomas, 262K contexto — descritiva e analise textual em portugues"

  gemma_4_moe:
    nome: Gemma 4 26B MoE (gratuito)
    model_id: openrouter/google/gemma-4-26b-a4b-it:free
    temperatura: 0.7
    groq_fallback: groq/openai/gpt-oss-20b
    descricao: "MoE rapido (4B ativos), 262K contexto — fontes externas, fallback padrao"

  gpt_oss_120b:
    nome: GPT-OSS 120B (gratuito)
    model_id: openrouter/openai/gpt-oss-120b:free
    temperatura: 0.6
    groq_fallback: groq/openai/gpt-oss-120b
    descricao: "117B MoE (5.1B ativos), 131K contexto — reasoning alternativo, tool use"

  gpt_oss_20b:
    nome: GPT-OSS 20B (gratuito)
    model_id: openrouter/openai/gpt-oss-20b:free
    temperatura: 0.7
    groq_fallback: groq/openai/gpt-oss-20b
    descricao: "21B MoE (3.6B ativos), 131K contexto — ultra-rapido (1000 TPS na Groq)"

  hermes_405b:
    nome: Hermes 3 Llama 3.1 405B (gratuito)
    model_id: openrouter/nousresearch/hermes-3-llama-3.1-405b:free
    temperatura: 0.7
    groq_fallback: groq/llama-3.3-70b-versatile
    descricao: "405B — maior modelo free, instruction following avancado"

  auto:
    nome: OpenRouter Auto (free)
    model_id: openrouter/openrouter/free
    temperatura: 0.7
    groq_fallback: groq/llama-3.3-70b-versatile
    descricao: "Roteamento automatico ao melhor modelo free disponivel"
