---
validacao_rigorosa_de_dados_e_pergunta:
  description: |
    Verificar se o usuário forneceu dados reais para análise de {topico_pesquisa}.
    Formatos aceitos: CSV, Excel, PDF, DOCX, URLs de datasets ou relatórios.
    - SE há dados: validar acesso e qualidade, confirmar ao usuário e prosseguir.
    - SE não há dados: PARAR e solicitar arquivos especificando formatos aceitos.
    NUNCA inventar, simular ou fabricar dados.
  expected_output: |
    Uma linha de status: "DADOS VALIDADOS: [lista de arquivos/fontes]" ou
    "DADOS NECESSÁRIOS: [solicitação clara ao usuário com formatos aceitos]".
  agent: agente_gerente_orquestrador

processamento_de_dados_reais_validados:
  description: |
    Processar os arquivos validados sobre {topico_pesquisa}:
    usar CSVProcessorTool para CSV/Excel, FileReadTool para PDF/DOCX.
    Extrair, limpar e estruturar os dados mantendo rastreabilidade da fonte.
  expected_output: |
    Sumário de processamento (máx. 300 palavras): origem dos dados, estrutura
    do dataset (colunas, linhas, tipos), qualidade (nulos, outliers detectados)
    e dados prontos para análise. Sem reproduzir os dados brutos.
  agent: agente_gerente_orquestrador
  context:
  - validacao_rigorosa_de_dados_e_pergunta

executar_analise_descritiva:
  description: |
    Análise descritiva de {topico_pesquisa} — "O que aconteceu?".
    Calcular estatísticas (média, mediana, desvio padrão, distribuição),
    identificar tendências temporais e gerar visualizações dos dados acadêmicos.
  expected_output: |
    Relatório descritivo (máx. 400 palavras) com: principais métricas e
    distribuições, tendências identificadas, gráficos em markdown e
    3–5 achados-chave destacados. Evitar repetir dados já no sumário de processamento.
  agent: especialista_em_analise_descritiva
  context:
  - processamento_de_dados_reais_validados

executar_analise_diagnostica:
  description: |
    Análise diagnóstica de {topico_pesquisa} — "Por que aconteceu?".
    Calcular correlações, executar testes de hipóteses (com α=0,05) e
    identificar causas raiz dos padrões observados nos dados acadêmicos.
  expected_output: |
    Relatório diagnóstico (máx. 400 palavras) com: correlações significativas
    encontradas, resultados dos testes estatísticos (estatística + p-valor +
    tamanho de efeito), causas identificadas e 3–5 achados-chave.
  agent: especialista_em_analise_diagnostica
  context:
  - processamento_de_dados_reais_validados

executar_analise_preditiva:
  description: |
    Análise preditiva de {topico_pesquisa} — "O que pode acontecer?".
    Construir modelo de previsão, gerar projeções com intervalos de confiança
    e estimar tendências futuras relevantes para o planejamento acadêmico.
  expected_output: |
    Relatório preditivo (máx. 400 palavras) com: modelo utilizado, métricas
    de validação, projeções para os próximos períodos com intervalos de
    confiança e 3–5 cenários para planejamento estratégico.
  agent: especialista_em_analise_preditiva
  context:
  - processamento_de_dados_reais_validados

executar_analise_prescritiva:
  description: |
    Análise prescritiva de {topico_pesquisa} — "O que devemos fazer?".
    Gerar recomendações acionáveis priorizadas por impacto, com planos
    de implementação e métricas de acompanhamento para gestores.
  expected_output: |
    Relatório prescritivo (máx. 400 palavras) com: lista priorizada de
    recomendações (alta/média/baixa urgência), passos de implementação
    por recomendação e indicadores de sucesso mensuráveis.
  agent: especialista_em_analise_prescritiva
  context:
  - processamento_de_dados_reais_validados

buscar_dados_externos_e_benchmarks:
  description: |
    Buscar benchmarks nacionais relevantes para contextualizar {topico_pesquisa}.
    Usar ExternalDataTool para obter indicadores INEP/IBGE/CAPES/MEC e
    comparar com os dados institucionais processados.
  expected_output: |
    Tabela de benchmarks (máx. 200 palavras): indicador nacional × valor de
    referência × fonte, com nota sobre como comparar com os dados da instituição.
  agent: especialista_em_fontes_externas
  context:
  - processamento_de_dados_reais_validados

executar_analise_textual:
  description: |
    Analisar conteúdo textual dos documentos de {topico_pesquisa}.
    Extrair palavras-chave, identificar entidades (instituições, datas,
    indicadores) e detectar temas predominantes em PDFs/DOCX fornecidos.
  expected_output: |
    Relatório textual (máx. 300 palavras) com: top-10 palavras-chave,
    entidades identificadas em tabela, temas por relevância e
    síntese qualitativa em 2–3 parágrafos.
  agent: especialista_em_analise_textual
  context:
  - processamento_de_dados_reais_validados

revisar_qualidade_cientifica:
  description: |
    Revisar a qualidade metodológica dos relatórios produzidos sobre {topico_pesquisa}.
    Verificar nos sumários recebidos: afirmações causais sem suporte, generalizações
    absolutas, p-valor sem tamanho de efeito, R² baixo sem ressalva, amostras pequenas
    não sinalizadas. Aplicar checklist por tipo de análise e pontuar 0–100.
  expected_output: |
    Parecer de qualidade (máx. 350 palavras): pontuação geral (0–100), nível
    (Excelente/Satisfatório/Necessita melhorias/Revisão necessária), alertas
    metodológicos encontrados, checklist resumido por tipo de análise e
    até 3 recomendações prioritárias de melhoria.
  agent: revisor_de_qualidade_cientifica
  context:
  - executar_analise_descritiva
  - executar_analise_diagnostica
  - executar_analise_preditiva
  - executar_analise_prescritiva
  - buscar_dados_externos_e_benchmarks
  - executar_analise_textual

compilacao_e_apresentacao_do_relatorio_final:
  description: |
    Compilar relatório final sobre {topico_pesquisa} integrando todos os resultados.
    Sintetizar achados dos especialistas, incorporar o parecer de qualidade e
    traduzir descobertas técnicas em linguagem acessível para gestores universitários.
  expected_output: |
    Relatório final em markdown com:
    1. Resumo executivo (3–5 bullets principais)
    2. Análise descritiva — achados-chave
    3. Análise diagnóstica — causas identificadas
    4. Análise preditiva — cenários futuros
    5. Análise prescritiva — recomendações priorizadas
    6. Contextualização nacional (benchmarks INEP/IBGE)
    7. Síntese documental (análise textual)
    8. Parecer de qualidade científica e ressalvas metodológicas
  agent: agente_gerente_orquestrador
  context:
  - revisar_qualidade_cientifica
