name: CI — SAPIENS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes e Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências do sistema (libmagic)
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1 libmagic-dev

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar uv
        run: pip install uv

      - name: Instalar dependências do projeto
        run: uv pip install --system -e ".[dev]"

      - name: Verificar lint com flake8
        run: |
          flake8 src/ --max-line-length=120 --exclude=__pycache__ \
            --extend-ignore=E501,W503,E203

      - name: Rodar testes unitários
        run: |
          pytest tests/test_tools.py -v --tb=short

      - name: Rodar testes de integração
        run: |
          pytest tests/test_crew_integration.py -v --tb=short

      - name: Rodar todos os testes com cobertura
        run: |
          pip install pytest-cov
          pytest tests/ --cov=src/Sapiens_MultiAgente --cov-report=term-missing \
            --cov-fail-under=50 -q

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: |
          docker build -t sapiens-multiagente:${{ github.sha }} .
          docker build -t sapiens-multiagente:latest .

      - name: Smoke test da imagem
        run: |
          docker run --rm -d \
            -e FLASK_SECRET_KEY=ci-test-key \
            -e SAPIENS_ENV=producao \
            -p 5000:5000 \
            --name sapiens-ci \
            sapiens-multiagente:latest
          sleep 10
          curl --fail http://localhost:5000/api/health || (docker logs sapiens-ci && exit 1)
          docker stop sapiens-ci
